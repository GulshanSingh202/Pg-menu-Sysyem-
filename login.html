 <!DOCTYPE html>
<html>
<head>
<title>PG Admin Login</title>

<style>
body{
font-family:Arial;
background:#667eea;
text-align:center;
padding:100px;
}

.box{
background:white;
padding:30px;
width:300px;
margin:auto;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#667eea;
color:white;
border:none;
}
</style>

</head>

<body>

<div class="box">

<h2>PG Admin Login</h2>

<input id="u" placeholder="Username">

<input id="p" type="password" placeholder="Password">

<button onclick="login()" onmouseover="this.style.backgroundColor='#0056b3'" onmouseout="this.style.backgroundColor='#007bff'">Login</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
function login(){

firebase.auth().signInWithEmailAndPassword(u.value, p.value)
.then((userCredential) => {

    let user = userCredential.user;

    // Admin check
    if(user.email === "admin@gmail.com"){
        location.href = "admin.html";
    }else{
        location.href = "menu.html";
    }

})
.catch((error) => {
    alert(error.message);
});

}
</script>

</body>
</html>
